<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agency 8 — Newsletter Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="logo">Agency 8</span>
      <span class="logo-sub">Newsletter Tool</span>
    </div>
  </header>

  <div class="container">
    <!-- Controls -->
    <div class="controls">
      <div class="fld">
        <label>Client</label>
        <select id="client"></select>
      </div>
      <div class="fld">
        <label>Month</label>
        <select id="month"><option value="">Select a client first…</option></select>
      </div>
      <div class="fld" id="pw-fld" style="display:none">
        <label>Password</label>
        <input type="password" id="password" placeholder="team password">
      </div>
      <button id="generate" class="btn-pri">Generate newsletter</button>
    </div>

    <div id="status" class="status"></div>

    <!-- Editor + preview -->
    <div id="workspace" class="workspace hidden">
      <div class="editor">
        <h3>Edit</h3>

        <label>Intro <span class="hint">(auto-written — tweak as needed)</span></label>
        <textarea id="narrative" rows="5"></textarea>

        <div class="metrics" id="metrics"></div>

        <label>Metrics to include <span class="hint">(click to expand — uncheck to hide)</span></label>
        <div class="metric-dropdown" id="metric-dropdown-wrap">
          <button type="button" class="metric-dropdown-btn" id="metric-dropdown-btn">▾ All metrics selected</button>
          <div class="metric-dropdown-menu hidden" id="metric-dropdown-menu">
            <label class="m-opt"><input type="checkbox" class="m-toggle" value="outreach" checked> Organic Outreach</label>
            <label class="m-opt"><input type="checkbox" class="m-toggle" value="gifts" checked> Gifts Confirmed</label>
            <label class="m-opt"><input type="checkbox" class="m-toggle" value="ugc" checked> UGC count</label>
            <label class="m-opt"><input type="checkbox" class="m-toggle" value="emv" checked> EMV</label>
            <label class="m-opt"><input type="checkbox" class="m-toggle" value="impressions"> Impressions</label>
            <label class="m-opt"><input type="checkbox" class="m-toggle" value="followership"> Total Followership</label>
          </div>
        </div>

        <label>Top UGC of the week <span class="hint">(check up to 3 to feature — click link to preview)</span></label>
        <div class="pick-list" id="top-ugc-list"></div>

        <label>Top Giftees of the week <span class="hint">(check up to 3 to feature)</span></label>
        <div class="pick-list" id="giftees-list"></div>

        <label>Highlights <span class="hint">(optional)</span></label>
        <textarea id="highlights" rows="2" placeholder="Anything to call out this week?"></textarea>
      </div>

      <div class="preview-wrap">
        <div class="preview-hdr">
          <h3>Preview</h3>
          <button id="copy" class="btn-pri btn-sm">Copy newsletter</button>
        </div>
        <div id="preview" class="preview"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
