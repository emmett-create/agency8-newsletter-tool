<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agency 8 — Newsletter Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <span class="logo">Agency 8</span>
      <span class="logo-sub">Newsletter Tool</span>
    </div>
  </header>

  <div class="container">
    <!-- Controls -->
    <div class="controls">
      <div class="fld">
        <label>Client</label>
        <select id="client"></select>
      </div>
      <div class="fld">
        <label>Month</label>
        <select id="month"><option value="">Select a client first…</option></select>
      </div>
      <div class="fld" id="pw-fld" style="display:none">
        <label>Password</label>
        <input type="password" id="password" placeholder="team password">
      </div>
      <button id="generate" class="btn-pri">Generate newsletter</button>
    </div>

    <div id="status" class="status"></div>

    <!-- Editor + preview -->
    <div id="workspace" class="workspace hidden">
      <div class="editor">
        <h3>Edit</h3>

        <label>Intro <span class="hint">(auto-written — tweak as needed)</span></label>
        <textarea id="narrative" rows="5"></textarea>

        <div class="metrics" id="metrics"></div>

        <label>Metrics to include <span class="hint">(uncheck to hide for this client)</span></label>
        <div id="metric-toggles" style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;margin:2px 0 8px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--text)"><input type="checkbox" class="m-toggle" value="outreach" checked> Organic Outreach</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--text)"><input type="checkbox" class="m-toggle" value="gifts" checked> Gifts Confirmed</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--text)"><input type="checkbox" class="m-toggle" value="ugc" checked> UGC</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--text)"><input type="checkbox" class="m-toggle" value="emv" checked> EMV</label>
        </div>

        <label>Top UGC of the week <span class="hint">(auto-filled — edit to feature others; keep a link so it stays clickable)</span></label>
        <textarea id="top-ugc" rows="3"></textarea>

        <label>Top Giftees of the week <span class="hint">(auto-filled by followers — comma-separated handles, editable)</span></label>
        <input type="text" id="giftees">

        <label>Highlights <span class="hint">(optional)</span></label>
        <textarea id="highlights" rows="2" placeholder="Anything to call out this week?"></textarea>
      </div>

      <div class="preview-wrap">
        <div class="preview-hdr">
          <h3>Preview</h3>
          <button id="copy" class="btn-pri btn-sm">Copy newsletter</button>
        </div>
        <div id="preview" class="preview"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
